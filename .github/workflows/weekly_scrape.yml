name: Weekly Library Directory Scrape

on:
  schedule:
    # This runs at 00:00 (midnight) every Sunday
    - cron: '0 0 * * 0'
  workflow_dispatch: # This allows you to click a button to run it manually

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. Download your code from the repo onto the cloud computer
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Install Python 3.13
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      # 3. Install the libraries from your requirements.txt
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # 4. Run your scraping script
      - name: Run scraper
        run: python LibDirScrapingScript.py

      # 5. Save the updated CSV back to your GitHub repository
      - name: Commit and push changes
        run: |
          git config --global user.name "GitHub Action Bot"
          git config --global user.email "actions@github.com"
          git add library_staff_directory.csv
          git commit -m "Automated weekly directory update" || exit 0
          git push
